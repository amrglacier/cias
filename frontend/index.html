<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIAS - 协同研判自动化系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1419;
      color: #e6e6e6;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 0; border-bottom: 1px solid #2a2a2a; margin-bottom: 24px;
    }
    .header h1 { font-size: 24px; color: #4fc3f7; }
    .header .version { font-size: 12px; color: #666; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab {
      padding: 8px 16px; border: 1px solid #333; border-radius: 6px;
      cursor: pointer; background: #1a1a2e; color: #888; font-size: 14px;
      transition: all 0.2s;
    }
    .tab.active { background: #4fc3f7; color: #0f1419; border-color: #4fc3f7; }
    .card {
      background: #1a1a2e; border: 1px solid #2a2a2a; border-radius: 8px;
      padding: 20px; margin-bottom: 16px;
    }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #4fc3f7; }
    .prediction-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px;
    }
    .pred-card {
      background: #16213e; border: 1px solid #2a2a2a; border-radius: 8px;
      padding: 16px; position: relative;
    }
    .pred-card.locked { border-color: #4caf50; }
    .pred-card.forced { border-color: #ff9800; }
    .pred-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .pred-match { font-size: 14px; font-weight: 600; }
    .pred-version { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
    .version-INITIAL { background: #1b5e20; color: #a5d6a7; }
    .version-PERIODIC { background: #e65100; color: #ffcc80; }
    .version-FINAL { background: #0d47a1; color: #82b1ff; }
    .pred-direction {
      font-size: 15px; padding: 8px 12px; background: #0f1419;
      border-radius: 4px; margin: 8px 0; border-left: 3px solid #4fc3f7;
    }
    .pred-scores { display: flex; gap: 12px; margin: 8px 0; }
    .score-box {
      flex: 1; background: #0f1419; border-radius: 4px; padding: 8px;
    }
    .score-label { font-size: 11px; color: #666; }
    .score-value { font-size: 18px; font-weight: 700; color: #e6e6e6; }
    .pred-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: #666; margin-top: 8px;
    }
    .badge {
      padding: 2px 8px; border-radius: 4px; font-size: 10px;
    }
    .badge-aligned { background: #1b5e20; color: #a5d6a7; }
    .badge-forced { background: #bf360c; color: #ffab91; }
    .badge-pending { background: #37474f; color: #90a4ae; }
    .review-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px;
    }
    .stat-box {
      background: #16213e; border-radius: 8px; padding: 16px; text-align: center;
    }
    .stat-value { font-size: 32px; font-weight: 700; color: #4fc3f7; }
    .stat-label { font-size: 12px; color: #666; margin-top: 4px; }
    .factors-list { list-style: none; padding: 0; }
    .factor-item {
      display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid #1a1a2e; font-size: 13px;
    }
    .factor-id { color: #666; }
    .factor-value { color: #4fc3f7; font-family: monospace; }
    .empty { text-align: center; padding: 48px; color: #666; }
    input, select, button {
      background: #0f1419; border: 1px solid #333; color: #e6e6e6;
      padding: 8px 12px; border-radius: 4px; font-size: 14px;
    }
    button { cursor: pointer; background: #4fc3f7; color: #0f1419; border: none; font-weight: 600; }
    button:hover { background: #29b6f6; }
    .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>CIAS - 协同研判自动化系统</h1>
        <div class="version">V1.4.2-SRS-FULL-PROD</div>
      </div>
      <div id="health-status">Loading...</div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="predictions">预测结果</div>
      <div class="tab" data-tab="review">复盘看板</div>
      <div class="tab" data-tab="config">系统配置</div>
    </div>

    <!-- Predictions Tab -->
    <div id="tab-predictions" class="tab-content">
      <div class="input-row">
        <input type="text" id="match-id-input" placeholder="Match ID" style="flex:1">
        <button onclick="loadPrediction()">查询</button>
        <button onclick="loadAllPredictions()">加载全部</button>
      </div>
      <div id="predictions-container" class="prediction-grid">
        <div class="empty">输入 Match ID 查询预测结果</div>
      </div>
    </div>

    <!-- Review Tab -->
    <div id="tab-review" class="tab-content" style="display:none">
      <div class="review-grid">
        <div class="stat-box">
          <div class="stat-value" id="stat-total">-</div>
          <div class="stat-label">总复盘数</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-hitrate">-</div>
          <div class="stat-label">命中率 (%)</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-upsets">-</div>
          <div class="stat-label">冷门数</div>
        </div>
      </div>
      <div id="reviews-container">
        <div class="empty">加载复盘数据...</div>
      </div>
    </div>

    <!-- Config Tab -->
    <div id="tab-config" class="tab-content" style="display:none">
      <div class="card">
        <div class="card-title">因子权重配置</div>
        <div id="config-container">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://cias-worker.274135814.workers.dev';

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).style.display = 'block';
      });
    });

    // Health check
    async function checkHealth() {
      try {
        const resp = await fetch(`${API_BASE}/api/health`);
        const data = await resp.json();
        document.getElementById('health-status').innerHTML =
          `<span style="color:${data.status === 'healthy' ? '#4caf50' : '#f44336'}">\u25cf ${data.status}</span>`;
      } catch (e) {
        document.getElementById('health-status').innerHTML = '<span style="color:#f44336">\u25cf Offline</span>';
      }
    }

    // Load prediction
    async function loadPrediction() {
      const matchId = document.getElementById('match-id-input').value.trim();
      if (!matchId) return;
      try {
        const resp = await fetch(`${API_BASE}/api/prediction?matchId=${matchId}`);
        if (!resp.ok) {
          document.getElementById('predictions-container').innerHTML =
            `<div class="empty">未找到 Match ID: ${matchId} 的预测结果</div>`;
          return;
        }
        const data = await resp.json();
        renderPredictions([data.prediction]);
      } catch (e) {
        document.getElementById('predictions-container').innerHTML =
          `<div class="empty">查询失败: ${e.message}</div>`;
      }
    }

    async function loadAllPredictions() {
      // In production, this would fetch all predictions
      document.getElementById('predictions-container').innerHTML =
        '<div class="empty">请输入具体 Match ID 查询</div>';
    }

    function renderPredictions(predictions) {
      if (!predictions || predictions.length === 0) {
        document.getElementById('predictions-container').innerHTML =
          '<div class="empty">无预测数据</div>';
        return;
      }
      const html = predictions.map(p => {
        if (!p) return '';
        const lockedClass = p.is_lock ? 'locked' : '';
        const forcedClass = p.alignment_forced_degrade ? 'forced' : '';
        const versionClass = `version-${p.version_tag}`;
        const alignBadge = p.alignment_status === 'aligned'
          ? '<span class="badge badge-aligned">ALIGNED</span>'
          : p.alignment_forced_degrade
          ? '<span class="badge badge-forced">FORCED</span>'
          : '<span class="badge badge-pending">PENDING</span>';

        const primaryText = p.primary_result === 'home_win' ? '主胜' : p.primary_result === 'draw' ? '平局' : '客胜';
        const hedgeText = p.hedge_result
          ? (p.hedge_result === 'home_win' ? '主胜' : p.hedge_result === 'draw' ? '平局' : '客胜')
          : '无';

        const factorsHtml = Object.entries(p.key_factors || {}).map(([id, f]) =>
          `<div class="factor-item"><span class="factor-id">${id}</span><span class="factor-value">${f.value?.toFixed(3) || 'N/A'} (w:${f.weight?.toFixed(2) || 'N/A'})</span></div>`
        ).join('');

        return `
          <div class="pred-card ${lockedClass} ${forcedClass}">
            <div class="pred-header">
              <div class="pred-match">${p.match_id}</div>
              <div class="pred-version ${versionClass}">${p.version_tag}</div>
            </div>
            <div class="pred-direction">${p.direction_judgment || 'N/A'}</div>
            <div class="pred-scores">
              <div class="score-box">
                <div class="score-label">主推 (${primaryText})</div>
                <div class="score-value">${p.primary_ft || 'N/A'} <span style="font-size:12px;color:#666">(${p.primary_ht || '-'})</span></div>
              </div>
              <div class="score-box">
                <div class="score-label">备选 (${hedgeText})</div>
                <div class="score-value">${p.hedge_ft || 'N/A'} <span style="font-size:12px;color:#666">(${p.hedge_ht || '-'})</span></div>
              </div>
            </div>
            <div class="pred-footer">
              ${alignBadge}
              <span>${p.is_lock ? '\uD83D\uDD12 LOCKED' : ''}</span>
            </div>
            ${factorsHtml ? `<details><summary style="cursor:pointer;font-size:12px;color:#666;margin-top:8px">Key Factors</summary><ul class="factors-list">${factorsHtml}</ul></details>` : ''}
          </div>
        `;
      }).join('');
      document.getElementById('predictions-container').innerHTML = html;
    }

    // Load reviews
    async function loadReviews() {
      try {
        const resp = await fetch(`${API_BASE}/api/reviews?limit=20`);
        const data = await resp.json();
        const reviews = data.reviews || [];

        const total = reviews.length;
        const correct = reviews.filter(r => r.error_type === 'none').length;
        const upsets = reviews.filter(r => r.is_upset).length;
        const hitRate = total > 0 ? ((correct / total) * 100).toFixed(1) : '0';

        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-hitrate').textContent = hitRate;
        document.getElementById('stat-upsets').textContent = upsets;

        const html = reviews.map(r => `
          <div class="card">
            <div style="display:flex;justify-content:space-between">
              <div><strong>${r.match_id}</strong> - <span class="badge version-${r.attribution_party === 'data' ? 'PERIODIC' : 'FINAL'}">${r.attribution_code}</span></div>
              <div style="font-size:11px;color:#666">${r.created_at || ''}</div>
            </div>
            <div style="margin-top:8px;font-size:13px">${r.attribution_detail}</div>
            <div style="margin-top:4px;font-size:11px;color:#666">Error: ${r.error_type} | Upset: ${r.is_upset ? 'Yes' : 'No'}</div>
          </div>
        `).join('');
        document.getElementById('reviews-container').innerHTML = html || '<div class="empty">无复盘数据</div>';
      } catch (e) {
        document.getElementById('reviews-container').innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
      }
    }

    // Load config
    async function loadConfig() {
      try {
        const resp = await fetch(`${API_BASE}/api/config?key=factor_weights`);
        const data = await resp.json();
        const weights = data.value || {};
        const html = Object.entries(weights).map(([key, value]) =>
          `<div class="factor-item"><span class="factor-id">${key}</span><span class="factor-value">${value}</span></div>`
        ).join('');
        document.getElementById('config-container').innerHTML = html || '<div class="empty">无配置数据</div>';
      } catch (e) {
        document.getElementById('config-container').innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
      }
    }

    // Init
    checkHealth();
    loadReviews();
    loadConfig();
    setInterval(checkHealth, 60000);
  </script>
</body>
</html>
